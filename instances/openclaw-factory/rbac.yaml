apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw-factory
  namespace: openclaw-factory
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openclaw-factory-read
  namespace: openclaw-factory
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openclaw-factory-read
  namespace: openclaw-factory
subjects:
  - kind: ServiceAccount
    name: openclaw-factory
    namespace: openclaw-factory
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openclaw-factory-read
