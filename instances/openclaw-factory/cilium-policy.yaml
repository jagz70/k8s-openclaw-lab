apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: openclaw-factory-containment
  namespace: openclaw-factory
spec:
  endpointSelector: {}
  ingress: []
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
    - toFQDNs:
        - matchName: api.openai.com
        - matchName: github.com
        - matchName: api.github.com
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
  egressDeny:
    - toCIDR:
        - 169.254.169.254/32
        - 100.100.100.200/32
