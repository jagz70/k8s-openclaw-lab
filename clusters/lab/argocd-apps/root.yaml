apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openclaw-lab-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jagz70/k8s-openclaw-lab.git
    targetRevision: main
    path: clusters/lab/argocd-apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
